#
#  OPTIMIZED REST module configuration for Real Power Tech Platform
#
#  This configuration includes timeout settings and connection pooling
#  to handle Vercel serverless cold starts.
#
#  INSTALLATION:
#  1. Copy this file to: /etc/freeradius/3.0/mods-available/rest
#  2. Restart FreeRADIUS: sudo systemctl restart freeradius
#
#  - Optimized by: GitHub Copilot
#  - Date: November 10, 2025
#

rest {
    # The base URI for our Vercel application.
    connect_uri = "https://rpt-phi.vercel.app"

    # Define the authorization endpoint.
    authorize {
        uri = "${..connect_uri}/api/v1/radius/authorize"
        method = 'post'
        body = 'json'

        # JSON payload sent to the API
        data = '{"User-Name": "%{User-Name}"}'

        # Security header for API authentication
        headers {
            "x-radius-secret" = "a53c30f7619ffcc7530633435670d2a28d575eb7030a1bcf6c2f3a9b8ea0ad8b"
        }
    }

    # Disable unused REST endpoints for performance
    authenticate {
        uri = "no"
    }
    preacct {
        uri = "no"
    }
    accounting {
        uri = "no"
    }
    post-auth {
        uri = "no"
    }
    pre-proxy {
        uri = "no"
    }
    post-proxy {
        uri = "no"
    }

    # JSON response parsing configuration
    json {
        # Our API returns: {"reply": [...]}
        reply-item-attribute = "reply"
    }

    # Connection pool settings - CRITICAL for performance
    pool {
        # Keep persistent connections to handle cold starts
        start = 5
        min = 3
        max = 15
        spare = 7
        # Idle timeout in seconds
        idle_timeout = 60
        # Cleanup interval
        cleanup_interval = 30
    }

    # TIMEOUT SETTINGS - CRITICAL FIX
    # Increased to handle Vercel cold starts (2-3 seconds) + DB queries
    connect_timeout = 3.0
    timeout = 10.0

    # TLS settings for HTTPS
    tls {
        # Verify the server certificate
        check_cert = yes
        # Don't check the certificate CN (Common Name)
        check_cert_cn = no
        # Extract certificate attributes if needed
        extract_cert_attrs = no
    }

    # Response handling and attribute mapping
    xlat {
        # No special xlat needed for our simple JSON response
    }
}
