<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Authenticating...</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .container {
        text-align: center;
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        max-width: 400px;
      }
      .spinner {
        border: 4px solid #f3f3f3;
        border-top: 4px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 1rem;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      h1 {
        color: #333;
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
      }
      p {
        color: #666;
        margin: 0;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="spinner"></div>
      <h1>Authenticating...</h1>
      <p>Connecting you to the internet</p>
    </div>

    <!-- Auto-submit login form -->
    <form id="loginForm" name="login" action="/login" method="post" style="display:none;">
      <input type="hidden" name="username" value="$(mac)" />
      <input type="hidden" name="password" value="$(mac)" />
      <input type="hidden" name="dst" value="$(link-orig)" />
      <input type="hidden" name="popup" value="true" />
    </form>

    <script>
      // Auto-submit the form immediately on page load
      window.onload = function() {
        console.log('Auto-submitting login form for MAC authentication');
        document.getElementById('loginForm').submit();
      };
    </script>
  </body>
</html>
